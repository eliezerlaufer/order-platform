server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    resolver 127.0.0.11 valid=30s;

    # SPA routing — serve index.html for all unknown paths
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api calls to api-gateway (running on host machine via Gradle)
    # Using variable to avoid nginx failing at startup if host is unreachable
    set $backend http://host.docker.internal:8888;
    location /api/ {
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
