spring:
  application:
    name: api-gateway
  # ---------------------------------------------------------------------------
  # Spring Cloud Gateway — roteamento de pedidos para os microserviços
  # ---------------------------------------------------------------------------
  # O frontend React faz TODOS os pedidos para localhost:8080.
  # O gateway decide para onde reencaminhar com base no path.
  # ---------------------------------------------------------------------------
  cloud:
    gateway:
      mvc:
        routes:
          # Pedidos que começam com /api/orders/ → order-service
          - id: order-service
            uri: http://localhost:8081
            predicates:
              - Path=/api/orders/**

          # Pedidos que começam com /api/inventory/ → inventory-service
          - id: inventory-service
            uri: http://localhost:8082
            predicates:
              - Path=/api/inventory/**

          # Pedidos que começam com /api/payments/ → payment-service
          - id: payment-service
            uri: http://localhost:8083
            predicates:
              - Path=/api/payments/**

          # Pedidos que começam com /api/products/ → inventory-service
          - id: products
            uri: http://localhost:8082
            predicates:
              - Path=/api/products/**

          # Pedidos que começam com /api/notifications/ → notification-service
          - id: notification-service
            uri: http://localhost:8084
            predicates:
              - Path=/api/notifications/**

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/order-platform

server:
  port: 8888   # ponto de entrada único para o frontend

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG

# ---------------------------------------------------------------------------
# OPENTELEMETRY — Traces distribuídos
# ---------------------------------------------------------------------------
otel:
  service:
    name: api-gateway
  exporter:
    otlp:
      endpoint: http://localhost:4318
  traces:
    exporter: otlp
  metrics:
    exporter: none
  logs:
    exporter: none
