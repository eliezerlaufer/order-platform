name: SonarCloud Analysis

# =============================================================================
# SONAR — static analysis + code coverage (GitHub Flow)
# =============================================================================
# Required GitHub Secrets (Settings → Secrets → Actions):
#   SONAR_TOKEN       → generate at sonarcloud.io → My Account → Security
#   SONAR_ORG         → your SonarCloud organization slug
#   SONAR_PROJECT_KEY → usually "<org>_order-platform"
#
# SonarCloud is FREE for public repositories.
# =============================================================================

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: sonar-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonar:
    name: SonarCloud
    runs-on: ubuntu-latest

    # Do not fail the PR if Sonar is not configured yet (no SONAR_TOKEN)
    # Remove this once you've set up SonarCloud
    if: ${{ vars.SONAR_ENABLED == 'true' || github.ref == 'refs/heads/main' }}

    steps:
      - name: Checkout (full history for blame)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # Cache SonarCloud analysis data (avoids re-downloading rules on every run)
      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      # Build + test + generate JaCoCo coverage reports + run Sonar analysis
      # All in one Gradle invocation so Sonar picks up coverage data.
      - name: Build, test and analyze
        run: |
          ./gradlew build sonar \
            --no-daemon \
            --parallel \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.organization=${{ secrets.SONAR_ORG }} \
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # enables PR decoration
          TESTCONTAINERS_RYUK_DISABLED: "true"

      - name: Summary
        if: always()
        run: |
          echo "### SonarCloud Analysis Complete 🔍" >> $GITHUB_STEP_SUMMARY
          echo "View results at: https://sonarcloud.io" >> $GITHUB_STEP_SUMMARY
