name: SonarCloud Analysis

# =============================================================================
# SONAR — static analysis + code coverage (GitHub Flow)
# =============================================================================
# Required GitHub Secrets (Settings → Secrets → Actions):
#   SONAR_TOKEN       → generate at sonarcloud.io → My Account → Security
#   SONAR_ORG         → your SonarCloud organization slug
#   SONAR_PROJECT_KEY → usually "<org>_order-platform"
#
# SonarCloud is FREE for public repositories.
# =============================================================================

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: sonar-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonar:
    name: SonarCloud
    runs-on: ubuntu-latest
    # Skip entirely if SONAR_TOKEN secret is not configured yet — won't block PRs
    if: ${{ secrets.SONAR_TOKEN != '' }}

    steps:
      - name: Checkout (full history for blame)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Cache SonarCloud packages
        uses: actions/cache@v5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Build, test and analyze
        run: |
          ./gradlew build sonar \
            --no-daemon \
            --parallel \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.organization=${{ secrets.SONAR_ORG }} \
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TESTCONTAINERS_RYUK_DISABLED: "true"

      - name: Summary
        if: always()
        run: |
          echo "### SonarCloud Analysis Complete" >> $GITHUB_STEP_SUMMARY
          echo "View results at: https://sonarcloud.io/project/overview?id=${{ secrets.SONAR_PROJECT_KEY }}" >> $GITHUB_STEP_SUMMARY
