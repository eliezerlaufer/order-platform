name: Docker Build & Push

# =============================================================================
# DOCKER — Build images and push to GitHub Container Registry (GHCR)
# =============================================================================
# GitHub Flow: triggers only on push to main (after PR is merged).
# Every merge to main produces new images tagged with :main-<sha7> and :latest.
#
# Images published:
#   ghcr.io/<owner>/order-platform/order-service:<tag>
#   ghcr.io/<owner>/order-platform/inventory-service:<tag>
#   ghcr.io/<owner>/order-platform/payment-service:<tag>
#   ghcr.io/<owner>/order-platform/notification-service:<tag>
#   ghcr.io/<owner>/order-platform/api-gateway:<tag>
#   ghcr.io/<owner>/order-platform/frontend:<tag>
#
# Authentication: uses GITHUB_TOKEN (automatic — no secrets to configure!)
# =============================================================================

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub UI

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/order-platform

jobs:
  # ---------------------------------------------------------------------------
  # BUILD JARS — one Gradle run, artifacts shared with Docker jobs
  # ---------------------------------------------------------------------------
  build-jars:
    name: Build JARs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build all bootJars (skip tests — already run by CI)
        run: |
          ./gradlew :order-service:bootJar \
                    :inventory-service:bootJar \
                    :payment-service:bootJar \
                    :notification-service:bootJar \
                    :api-gateway:bootJar \
                    -x test --no-daemon --parallel

      # Upload JARs so the matrix Docker jobs can download them
      - name: Upload JARs
        uses: actions/upload-artifact@v7
        with:
          name: service-jars
          path: |
            order-service/build/libs/*.jar
            inventory-service/build/libs/*.jar
            payment-service/build/libs/*.jar
            notification-service/build/libs/*.jar
            api-gateway/build/libs/*.jar
          retention-days: 1

  # ---------------------------------------------------------------------------
  # DOCKER BUILD & PUSH — parallel matrix: one job per service
  # ---------------------------------------------------------------------------
  docker:
    name: Docker — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: build-jars

    permissions:
      contents: read
      packages: write   # needed to push to GHCR

    strategy:
      matrix:
        include:
          - service: order-service
            port: 8081
          - service: inventory-service
            port: 8082
          - service: payment-service
            port: 8083
          - service: notification-service
            port: 8084
          - service: api-gateway
            port: 8888

    steps:
      - uses: actions/checkout@v4

      # Download the JARs built in the previous job
      - name: Download JARs
        uses: actions/download-artifact@v4
        with:
          name: service-jars

      # Compute image tags:
      #   develop push  → ghcr.io/.../service:develop-<sha7>
      #   main push     → ghcr.io/.../service:main-<sha7>  AND  :latest
      - name: Compute tags
        id: tags
        run: |
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          BRANCH="${{ github.ref_name }}"
          IMAGE="${{ env.IMAGE_PREFIX }}/${{ matrix.service }}"
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT
          echo "tag=${BRANCH}-${SHORT_SHA}" >> $GITHUB_OUTPUT

          # GitHub Flow: main is always the deployable branch → always tag :latest
          TAGS="${IMAGE}:main-${SHORT_SHA},${IMAGE}:latest"
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Docker Buildx for multi-platform support (optional but good practice)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.service }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          # Cache Docker layers between runs — speeds up subsequent builds
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

      - name: Summary
        run: |
          echo "### Docker image published 🐳" >> $GITHUB_STEP_SUMMARY
          echo "**Service:** \`${{ matrix.service }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:** \`${{ steps.tags.outputs.tags }}\`" >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------------------
  # FRONTEND — self-contained multi-stage build (Node + Nginx), no JAR needed
  # ---------------------------------------------------------------------------
  docker-frontend:
    name: Docker — frontend
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Compute tags
        id: tags
        run: |
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          IMAGE="${{ env.IMAGE_PREFIX }}/frontend"
          TAGS="${IMAGE}:main-${SHORT_SHA},${IMAGE}:latest"
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: frontend
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          # Pass K8s-friendly defaults for Vite build-time env vars
          build-args: |
            VITE_KEYCLOAK_URL=http://keycloak:8080
            VITE_KEYCLOAK_REALM=order-platform
            VITE_KEYCLOAK_CLIENT_ID=frontend
            VITE_API_BASE_URL=/api
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

      - name: Summary
        run: |
          echo "### Docker image published 🐳" >> $GITHUB_STEP_SUMMARY
          echo "**Service:** \`frontend\`" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:** \`${{ steps.tags.outputs.tags }}\`" >> $GITHUB_STEP_SUMMARY
