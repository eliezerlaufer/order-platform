apiVersion: v1
kind: ConfigMap
metadata:
  name: postgresql-init
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "order-platform.componentLabels" (dict "component" "postgresql" "context" $) | nindent 4 }}
data:
  init-multiple-dbs.sh: |
    #!/bin/bash
    # =============================================================================
    # Creates one database per microservice (database-per-service pattern).
    # Runs only on first PostgreSQL startup (when data directory is empty).
    # =============================================================================
    set -e

    DATABASES="{{ .Values.postgresql.databases | join "," }}"

    echo "Creating multiple databases: ${DATABASES}"
    for db in $(echo "${DATABASES}" | tr ',' ' '); do
      echo "  → Creating database: ${db}"
      psql -v ON_ERROR_STOP=1 --username "${POSTGRES_USER}" <<-EOSQL
        SELECT 'CREATE DATABASE ${db}' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = '${db}')\gexec
        GRANT ALL PRIVILEGES ON DATABASE ${db} TO ${POSTGRES_USER};
    EOSQL
    done

    echo "All databases created successfully."
