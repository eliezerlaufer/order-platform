apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "order-platform.componentLabels" (dict "component" "otel-collector" "context" $) | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "order-platform.componentSelectorLabels" (dict "component" "otel-collector" "context" $) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "order-platform.componentLabels" (dict "component" "otel-collector" "context" $) | nindent 8 }}
    spec:
      containers:
        - name: otel-collector
          image: "{{ .Values.observability.otelCollector.image.repository }}:{{ .Values.observability.otelCollector.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          args:
            - --config=/etc/otel/config.yaml
          ports:
            - name: grpc
              containerPort: 4317
              protocol: TCP
            - name: http
              containerPort: 4318
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/otel
          resources:
            requests:
              memory: {{ .Values.observability.otelCollector.resources.requests.memory }}
              cpu: {{ .Values.observability.otelCollector.resources.requests.cpu }}
            limits:
              memory: {{ .Values.observability.otelCollector.resources.limits.memory }}
              cpu: {{ .Values.observability.otelCollector.resources.limits.cpu }}
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
