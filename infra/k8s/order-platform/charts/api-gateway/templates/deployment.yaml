apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "order-platform.componentLabels" (dict "component" "api-gateway" "context" $) | nindent 4 }}
spec:
  replicas: {{ .Values.serviceDefaults.replicas }}
  selector:
    matchLabels:
      {{- include "order-platform.componentSelectorLabels" (dict "component" "api-gateway" "context" $) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "order-platform.componentLabels" (dict "component" "api-gateway" "context" $) | nindent 8 }}
      annotations:
        {{- include "order-platform.prometheusAnnotations" (dict "port" "8888") | nindent 8 }}
    spec:
      containers:
        - name: api-gateway
          image: "{{ .Values.apiGateway.image.repository }}:{{ .Values.apiGateway.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 8888
              protocol: TCP
          envFrom:
            - configMapRef:
                name: api-gateway-config
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: {{ .Values.serviceDefaults.resources.requests.memory }}
              cpu: {{ .Values.serviceDefaults.resources.requests.cpu }}
            limits:
              memory: {{ .Values.serviceDefaults.resources.limits.memory }}
              cpu: {{ .Values.serviceDefaults.resources.limits.cpu }}
