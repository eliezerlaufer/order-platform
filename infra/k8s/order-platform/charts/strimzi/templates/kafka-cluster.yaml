# =============================================================================
# Strimzi Kafka Cluster — KRaft mode (no ZooKeeper)
# =============================================================================
# The Strimzi operator must be installed BEFORE applying this resource.
# Run: ./infra/k8s/scripts/setup-cluster.sh
# =============================================================================
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: combined
  namespace: {{ .Values.global.namespace }}
  labels:
    strimzi.io/cluster: order-platform-kafka
    {{- include "order-platform.componentLabels" (dict "component" "kafka" "context" $) | nindent 4 }}
spec:
  replicas: {{ .Values.kafka.replicas }}
  roles:
    - controller
    - broker
  storage:
    {{- if eq .Values.kafka.storage.type "ephemeral" }}
    type: ephemeral
    {{- else }}
    type: persistent-claim
    size: {{ .Values.kafka.storage.size }}
    deleteClaim: false
    {{- end }}
  resources:
    requests:
      memory: {{ .Values.kafka.resources.requests.memory }}
      cpu: {{ .Values.kafka.resources.requests.cpu }}
    limits:
      memory: {{ .Values.kafka.resources.limits.memory }}
      cpu: {{ .Values.kafka.resources.limits.cpu }}
---
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: order-platform-kafka
  namespace: {{ .Values.global.namespace }}
  annotations:
    strimzi.io/kraft: "enabled"
    strimzi.io/node-pools: "enabled"
  labels:
    {{- include "order-platform.componentLabels" (dict "component" "kafka" "context" $) | nindent 4 }}
spec:
  kafka:
    version: {{ .Values.kafka.version }}
    metadataVersion: {{ .Values.kafka.version }}
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
    config:
      # Minimal replication for local development
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
      # Log retention
      log.retention.hours: 168          # 7 days
      log.segment.bytes: 1073741824     # 1 GB
      # Auto-create topics disabled — we define them explicitly via KafkaTopic CRDs
      auto.create.topics.enable: "false"
  entityOperator:
    topicOperator: {}
