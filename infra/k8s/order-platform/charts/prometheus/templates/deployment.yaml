apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "order-platform.componentLabels" (dict "component" "prometheus" "context" $) | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "order-platform.componentSelectorLabels" (dict "component" "prometheus" "context" $) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "order-platform.componentLabels" (dict "component" "prometheus" "context" $) | nindent 8 }}
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: "{{ .Values.observability.prometheus.image.repository }}:{{ .Values.observability.prometheus.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time={{ .Values.observability.prometheus.retentionDays }}d
            - --web.enable-lifecycle
          ports:
            - name: http
              containerPort: 9090
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
          resources:
            requests:
              memory: {{ .Values.observability.prometheus.resources.requests.memory }}
              cpu: {{ .Values.observability.prometheus.resources.requests.cpu }}
            limits:
              memory: {{ .Values.observability.prometheus.resources.limits.memory }}
              cpu: {{ .Values.observability.prometheus.resources.limits.cpu }}
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          persistentVolumeClaim:
            claimName: prometheus-data
