apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "order-platform.componentLabels" (dict "component" "prometheus" "context" $) | nindent 4 }}
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ .Values.observability.prometheus.storage.size }}
  {{- if .Values.observability.prometheus.storage.storageClassName }}
  storageClassName: {{ .Values.observability.prometheus.storage.storageClassName }}
  {{- end }}
