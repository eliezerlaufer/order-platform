apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "order-platform.componentLabels" (dict "component" "notification-service" "context" $) | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "order-platform.componentSelectorLabels" (dict "component" "notification-service" "context" $) | nindent 4 }}
  ports:
    - name: http
      port: 8084
      targetPort: http
      protocol: TCP
