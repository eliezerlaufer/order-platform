apiVersion: v1
kind: Secret
metadata:
  name: order-service-db
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "order-platform.componentLabels" (dict "component" "order-service" "context" $) | nindent 4 }}
type: Opaque
stringData:
  DB_USERNAME: {{ .Values.postgresql.credentials.username }}
  DB_PASSWORD: {{ .Values.postgresql.credentials.password }}
