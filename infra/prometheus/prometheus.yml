# =============================================================================
# PROMETHEUS — Configuração de scraping
# =============================================================================
# Scrape interval global: 15s
# Cada microserviço expõe métricas em /actuator/prometheus
#
# host.docker.internal → resolve para o IP do host Windows/Mac
# Necessário porque as apps correm no host, não em containers
# =============================================================================

global:
  scrape_interval: 15s        # frequência de recolha de métricas
  evaluation_interval: 15s    # frequência de avaliação de alertas

scrape_configs:

  # ---------------------------------------------------------------------------
  # PROMETHEUS — auto-monitorização
  # ---------------------------------------------------------------------------
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  # ---------------------------------------------------------------------------
  # ORDER-SERVICE (porta 8081)
  # ---------------------------------------------------------------------------
  - job_name: order-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [host.docker.internal:8081]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: order-service

  # ---------------------------------------------------------------------------
  # INVENTORY-SERVICE (porta 8082)
  # ---------------------------------------------------------------------------
  - job_name: inventory-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [host.docker.internal:8082]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: inventory-service

  # ---------------------------------------------------------------------------
  # PAYMENT-SERVICE (porta 8083)
  # ---------------------------------------------------------------------------
  - job_name: payment-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [host.docker.internal:8083]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: payment-service

  # ---------------------------------------------------------------------------
  # NOTIFICATION-SERVICE (porta 8084)
  # ---------------------------------------------------------------------------
  - job_name: notification-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [host.docker.internal:8084]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: notification-service

  # ---------------------------------------------------------------------------
  # API-GATEWAY (porta 8888)
  # ---------------------------------------------------------------------------
  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [host.docker.internal:8888]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: api-gateway
