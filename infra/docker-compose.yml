# =============================================================================
# ORDER PLATFORM — Ambiente Local de Desenvolvimento
# =============================================================================
# Como usar:
#   docker compose up -d          → sobe tudo em background
#   docker compose down           → para e remove containers
#   docker compose logs -f kafka  → ver logs do Kafka em tempo real
#
# Portas expostas:
#   5432  → PostgreSQL
#   9092  → Kafka (apps Spring Boot ligam aqui: localhost:9092)
#   8080  → Keycloak admin console
#   8090  → Kafka UI (abrir no browser: http://localhost:8090)
#   3000  → Frontend React
#   4317  → OTel Collector gRPC (apps Spring Boot enviam traces aqui)
#   4318  → OTel Collector HTTP
#   16686 → Jaeger UI (abrir no browser: http://localhost:16686)
#   9090  → Prometheus UI (abrir no browser: http://localhost:9090)
#   3001  → Grafana (abrir no browser: http://localhost:3001, admin/admin)
# =============================================================================

services:

  # ===========================================================================
  # POSTGRESQL — Base de dados relacional
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: order-platform-postgres
    environment:
      POSTGRES_USER: orderplatform
      POSTGRES_PASSWORD: orderplatform123
      POSTGRES_MULTIPLE_DATABASES: orders_db,inventory_db,payments_db,notifications_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    ports:
      - "5432:5432"

  # ===========================================================================
  # KAFKA — Message broker (KRaft mode, sem Zookeeper)
  # ===========================================================================
  # REDE — dois listeners para resolver o problema clássico de Docker:
  #
  #   INTERNAL://kafka:29092  → usado por outros containers (ex: Kafka UI)
  #                             "kafka" é o nome do container na rede Docker
  #
  #   EXTERNAL://localhost:9092 → usado pelas apps Spring Boot que correm
  #                               no teu PC fora do Docker
  #
  # As apps Spring Boot usam: bootstrap-servers: localhost:9092
  # O Kafka UI usa:           bootstrapServers: kafka:29092
  # ===========================================================================
  kafka:
    image: apache/kafka:3.9.1
    container_name: order-platform-kafka
    environment:
      # KRaft mode — Kafka sem Zookeeper (padrão desde Kafka 3.3)
      KAFKA_NODE_ID: 0
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka:9094

      # Dois listeners: INTERNAL para Docker, EXTERNAL para o host
      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # Configuração para ambiente local (replicação mínima)
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

      # Cluster ID obrigatório para KRaft no apache/kafka
      CLUSTER_ID: "order-platform-kafka-cluster"
    ports:
      - "9092:9092"   # porta externa para as apps Spring Boot

  # ===========================================================================
  # KAFKA UI — Interface visual para explorar topics e mensagens
  # ===========================================================================
  # Acede em: http://localhost:8090
  # Liga ao Kafka via rede interna Docker (kafka:29092)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: order-platform-kafka-ui
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    ports:
      - "8090:8080"

  # ===========================================================================
  # KEYCLOAK — Identity Provider (JWT tokens)
  # ===========================================================================
  # Admin console: http://localhost:8080 (admin/admin)
  # Em modo dev usa base de dados H2 embebida — simples e sem dependências
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: order-platform-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    command: start-dev
    ports:
      - "8080:8080"

  # ===========================================================================
  # FRONTEND — React 18 + Vite SPA servida via nginx
  # ===========================================================================
  # Acede em: http://localhost:3000
  # Faz proxy de /api para o api-gateway (interno Docker: api-gateway:8888)
  # Antes de usar: configurar Keycloak client em http://localhost:8080
  #   realm=order-platform → Clients → frontend → Valid Redirect URIs: http://localhost:3000/*
  # ===========================================================================
  frontend:
    build:
      context: ../frontend
      args:
        VITE_KEYCLOAK_URL: http://localhost:8080
        VITE_KEYCLOAK_REALM: order-platform
        VITE_KEYCLOAK_CLIENT_ID: frontend
        VITE_API_BASE_URL: /api
    container_name: order-platform-frontend
    ports:
      - "3000:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - keycloak

  # ===========================================================================
  # OPENTELEMETRY COLLECTOR — Recebe traces e reencaminha para o Jaeger
  # ===========================================================================
  # As apps Spring Boot enviam traces para localhost:4317 (gRPC)
  # O Collector reencaminha para o Jaeger via OTLP gRPC (jaeger:4317)
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.122.1
    container_name: order-platform-otel-collector
    command: ["--config=/etc/otelcol-contrib/config.yml"]
    volumes:
      - ./otel/otel-collector-config.yml:/etc/otelcol-contrib/config.yml:ro
    ports:
      - "4317:4317"   # gRPC — apps Spring Boot enviam traces aqui
      - "4318:4318"   # HTTP — alternativa HTTP/protobuf

  # ===========================================================================
  # JAEGER ALL-IN-ONE — UI de traces distribuídos
  # ===========================================================================
  # Acede em: http://localhost:16686
  # Recebe traces do OTel Collector via OTLP gRPC (porta 4317 interna)
  jaeger:
    image: jaegertracing/all-in-one:1.65.0
    container_name: order-platform-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"   # aceita OTLP além do formato nativo
    ports:
      - "16686:16686"   # Jaeger UI
    depends_on:
      - otel-collector

  # ===========================================================================
  # PROMETHEUS — Scrape de métricas dos serviços
  # ===========================================================================
  # Acede em: http://localhost:9090
  # Scrape via /actuator/prometheus de cada serviço (host.docker.internal)
  prometheus:
    image: prom/prometheus:v3.3.1
    container_name: order-platform-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d    # guarda 7 dias de métricas
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    extra_hosts:
      # Resolve host.docker.internal → IP do host (necessário no Linux)
      - "host.docker.internal:host-gateway"

  # ===========================================================================
  # GRAFANA — Dashboards de métricas e traces
  # ===========================================================================
  # Acede em: http://localhost:3001 (admin/admin)
  # Porta 3001 para não colidir com o frontend React (3000)
  # Datasources e dashboards provisionados automaticamente
  grafana:
    image: grafana/grafana:11.6.1
    container_name: order-platform-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor   # editor TraceQL para Jaeger
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - jaeger

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
