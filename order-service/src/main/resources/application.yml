# =============================================================================
# ORDER-SERVICE — Configuração da aplicação
# =============================================================================
# Este ficheiro configura o serviço para o ambiente de desenvolvimento local.
# Em produção (K8s), os valores sensíveis são substituídos por variáveis de
# ambiente (ex: ${DB_PASSWORD} lê a env var DB_PASSWORD).
# =============================================================================

spring:
  application:
    name: order-service   # Nome usado em logs, traces e Kubernetes

  # ---------------------------------------------------------------------------
  # BASE DE DADOS
  # ---------------------------------------------------------------------------
  datasource:
    # URL de ligação ao PostgreSQL (container local do docker-compose)
    url: jdbc:postgresql://localhost:5432/orders_db
    username: orderplatform
    password: orderplatform123
    driver-class-name: org.postgresql.Driver
    # HikariCP — connection pool (Spring Boot usa por defeito)
    hikari:
      maximum-pool-size: 10       # máx. 10 ligações simultâneas
      minimum-idle: 2             # mínimo de ligações sempre abertas
      connection-timeout: 30000   # 30s para obter ligação do pool

  # ---------------------------------------------------------------------------
  # JPA / HIBERNATE
  # ---------------------------------------------------------------------------
  jpa:
    hibernate:
      # validate → Hibernate verifica se o schema da DB bate certo com as entidades
      # Nunca usar "create" ou "update" em produção (o Flyway faz as migrações)
      ddl-auto: validate
    show-sql: false         # true em debug; false em prod (demasiado ruído)
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ---------------------------------------------------------------------------
  # FLYWAY — Migrações de base de dados
  # ---------------------------------------------------------------------------
  # O Flyway aplica automaticamente os scripts SQL em db/migration/
  # na ordem: V1__..., V2__..., V3__...
  flyway:
    enabled: true
    locations: classpath:db/migration

  # ---------------------------------------------------------------------------
  # KAFKA — Message broker
  # ---------------------------------------------------------------------------
  kafka:
    bootstrap-servers: localhost:9092   # endereço do Kafka (docker-compose)

    # Produtor — como este serviço publica eventos
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      # StringSerializer porque o payload já é JSON string vindo da tabela outbox
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all          # aguarda confirmação de todos os replicas (mais seguro)
      retries: 3         # tenta 3x antes de falhar
      properties:
        enable.idempotence: true   # garante exactly-once no produtor

    # Consumidor — como este serviço lê eventos de outros serviços
    consumer:
      group-id: order-service          # identificador deste grupo de consumidores
      auto-offset-reset: earliest      # começa do início se não houver offset guardado
      enable-auto-commit: false        # NÓS controlamos o commit (após processamento)
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # StringDeserializer — parse manual com ObjectMapper no listener
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        isolation.level: read_committed  # não lê mensagens de transações incompletas

    # Ack manual após processamento bem-sucedido
    listener:
      ack-mode: MANUAL_IMMEDIATE

  # ---------------------------------------------------------------------------
  # SEGURANÇA — OAuth2 com Keycloak
  # ---------------------------------------------------------------------------
  security:
    oauth2:
      resourceserver:
        jwt:
          # Keycloak emite tokens JWT; o Spring valida a assinatura aqui
          issuer-uri: http://localhost:8080/realms/order-platform

# ---------------------------------------------------------------------------
# SERVER
# ---------------------------------------------------------------------------
server:
  port: 8081   # Cada serviço tem a sua porta (ver docs/architecture.md)

# ---------------------------------------------------------------------------
# ACTUATOR — Health checks e métricas (usado pelo Kubernetes)
# ---------------------------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true   # /actuator/health/liveness e /actuator/health/readiness
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

# ---------------------------------------------------------------------------
# LOGGING
# ---------------------------------------------------------------------------
logging:
  level:
    pt.orderplatform: DEBUG           # código nosso em DEBUG
    org.springframework.kafka: INFO   # Kafka em INFO (evita demasiado ruído)
    org.hibernate.SQL: DEBUG          # ver SQL gerado (desligar em prod)
  pattern:
    # Formato com trace ID para correlacionar logs entre serviços
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [traceId=%X{traceId}] %-5level %logger{36} - %msg%n"
